workflows:
  ios-quarkgps-release:
    name: iOS QuarkGPS Release
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      vars:
        XCODE_PROJECT: "QuarkGPS.xcodeproj"
        XCODE_SCHEME: "QuarkGPS"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.quarkgps
      xcode: 16.4
      cocoapods: default

    integrations:
      app_store_connect: QuarkGPS_AppStoreConnect

    scripts:
      - name: Apply code signing settings
        script: |
          xcode-project use-profiles

      - name: Set build number
        script: |
          agvtool new-version -all $BUILD_NUMBER || true

      - name: Build archive
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$CM_BUILD_DIR/build/QuarkGPS.xcarchive" \
            clean archive

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/QuarkGPS.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build/export" \
            -exportOptionsPlist /Users/builder/export_options.plist

    artifacts:
      - build/export/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false