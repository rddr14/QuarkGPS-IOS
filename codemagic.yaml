workflows:
  ios-quarkgps-release:
    name: iOS QuarkGPS Release
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      vars:
        XCODE_PROJECT: "QuarkGPS.xcodeproj"
        XCODE_SCHEME: "QuarkGPS"
        WHITE_LABEL_KEY: "quarkgps"
        APP_DISPLAY_NAME: "QuarkGPS"
        BUNDLE_ID: "com.quarkgps"
        ICON_SOURCE: "branding/quarkgps/AppIcon-1024.png"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.quarkgps
      xcode: latest
      cocoapods: default

    integrations:
      app_store_connect: QuarkGPS_AppStoreConnect

    scripts:
      - name: Configure white-label values
        script: |
          PLIST_PATH="$CM_BUILD_DIR/QuarkGPS/Info.plist"
          APPICON_DIR="$CM_BUILD_DIR/QuarkGPS/Assets.xcassets/AppIcon.appiconset"
          ICON_PATH="$CM_BUILD_DIR/$ICON_SOURCE"

          [[ -f "$ICON_PATH" ]] || { echo "Icon file not found: $ICON_PATH"; exit 1; }

          /usr/libexec/PlistBuddy -c "Set :WhiteLabelKey $WHITE_LABEL_KEY" "$PLIST_PATH" || \
            /usr/libexec/PlistBuddy -c "Add :WhiteLabelKey string $WHITE_LABEL_KEY" "$PLIST_PATH"

          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName $APP_DISPLAY_NAME" "$PLIST_PATH" || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string $APP_DISPLAY_NAME" "$PLIST_PATH"

          cp "$ICON_PATH" "$APPICON_DIR/AppIcon-1024.png"

      - name: Generate complete App Icons (no alpha)
        script: |
          APPICON_DIR="$CM_BUILD_DIR/QuarkGPS/Assets.xcassets/AppIcon.appiconset"
          SOURCE_ICON="$APPICON_DIR/AppIcon-1024.png"

          # App Store rejects alpha in the 1024 marketing icon.
          sips -s format jpeg "$SOURCE_ICON" --out "$APPICON_DIR/AppIcon-base.jpg" >/dev/null
          sips -s format png "$APPICON_DIR/AppIcon-base.jpg" --out "$APPICON_DIR/AppIcon-1024.png" >/dev/null
          rm -f "$APPICON_DIR/AppIcon-base.jpg"

          make_icon() {
            local size="$1"
            local name="$2"
            sips -z "$size" "$size" "$APPICON_DIR/AppIcon-1024.png" --out "$APPICON_DIR/$name" >/dev/null
          }

          make_icon 20 AppIcon-20@1x.png
          make_icon 40 AppIcon-20@2x.png
          make_icon 60 AppIcon-20@3x.png
          make_icon 29 AppIcon-29@1x.png
          make_icon 58 AppIcon-29@2x.png
          make_icon 87 AppIcon-29@3x.png
          make_icon 40 AppIcon-40@1x.png
          make_icon 80 AppIcon-40@2x.png
          make_icon 120 AppIcon-40@3x.png
          make_icon 120 AppIcon-60@2x.png
          make_icon 180 AppIcon-60@3x.png
          make_icon 76 AppIcon-76@1x.png
          make_icon 152 AppIcon-76@2x.png
          make_icon 167 AppIcon-83.5@2x.png

      - name: Apply code signing settings
        script: |
          xcode-project use-profiles

      - name: Set build number
        script: |
          agvtool new-version -all $BUILD_NUMBER || true

      - name: Build archive
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$CM_BUILD_DIR/build/QuarkGPS.xcarchive" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            clean archive

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/QuarkGPS.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build/export" \
            -exportOptionsPlist /Users/builder/export_options.plist

    artifacts:
      - build/export/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

