  ios-rm-release:
    name: iOS RM Rastreadores Release
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      vars:
        XCODE_PROJECT: "ios.xcodeproj"
        XCODE_SCHEME: "QuarkGPS"
        WHITE_LABEL_KEY: "rmrastreadores"
        APP_DISPLAY_NAME: "RM Rastreadores"
        BUNDLE_ID: "com.rmrastreadores"
        BRANDING_KEY: "rmrastreadores"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.rmrastreadores
      xcode: latest
      cocoapods: default

    integrations:
      app_store_connect: QuarkGPS_AppStoreConnect

    scripts:
      - name: Configure white-label values
        script: |
          PLIST_PATH="$CM_BUILD_DIR/ios/Info.plist"
          APPICON_DIR="$CM_BUILD_DIR/ios/Assets.xcassets/AppIcon.appiconset"
          BRANDING_DIR="$CM_BUILD_DIR/branding/$BRANDING_KEY"
          BRANDING_FILE="$BRANDING_DIR/Branding.properties"
          ICON_PATH="$BRANDING_DIR/AppIcon-1024.png"

          [[ -f "$BRANDING_FILE" ]] || { echo "Branding file not found: $BRANDING_FILE"; exit 1; }
          [[ -f "$ICON_PATH" ]] || { echo "Icon file not found: $ICON_PATH"; exit 1; }

          cp "$BRANDING_FILE" "$CM_BUILD_DIR/ios/Branding.properties"

          APP_DISPLAY_NAME="$(awk -F= '$1=="appName" { print $2 }' "$BRANDING_FILE")"
          WHITE_LABEL_KEY="$(awk -F= '$1=="key" { print $2 }' "$BRANDING_FILE")"

          /usr/libexec/PlistBuddy -c "Set :WhiteLabelKey $WHITE_LABEL_KEY" "$PLIST_PATH" || \
            /usr/libexec/PlistBuddy -c "Add :WhiteLabelKey string $WHITE_LABEL_KEY" "$PLIST_PATH"

          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName $APP_DISPLAY_NAME" "$PLIST_PATH" || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string $APP_DISPLAY_NAME" "$PLIST_PATH"

          cp "$ICON_PATH" "$APPICON_DIR/AppIcon-1024.png"

      - name: Generate complete App Icons (no alpha)
        script: |
          APPICON_DIR="$CM_BUILD_DIR/ios/Assets.xcassets/AppIcon.appiconset"
          SOURCE_ICON="$APPICON_DIR/AppIcon-1024.png"

          sips -s format jpeg "$SOURCE_ICON" --out "$APPICON_DIR/AppIcon-base.jpg" >/dev/null
          sips -s format png "$APPICON_DIR/AppIcon-base.jpg" --out "$APPICON_DIR/AppIcon-1024.png" >/dev/null
          rm -f "$APPICON_DIR/AppIcon-base.jpg"

          make_icon() {
            local size="$1"
            local name="$2"
            sips -z "$size" "$size" "$APPICON_DIR/AppIcon-1024.png" --out "$APPICON_DIR/$name" >/dev/null
          }

          make_icon 20 AppIcon-20@1x.png
          make_icon 40 AppIcon-20@2x.png
          make_icon 60 AppIcon-20@3x.png
          make_icon 29 AppIcon-29@1x.png
          make_icon 58 AppIcon-29@2x.png
          make_icon 87 AppIcon-29@3x.png
          make_icon 40 AppIcon-40@1x.png
          make_icon 80 AppIcon-40@2x.png
          make_icon 120 AppIcon-40@3x.png
          make_icon 120 AppIcon-60@2x.png
          make_icon 180 AppIcon-60@3x.png
          make_icon 76 AppIcon-76@1x.png
          make_icon 152 AppIcon-76@2x.png
          make_icon 167 AppIcon-83.5@2x.png

      - name: Configure bundle identifier
        script: |
          PBXPROJ_PATH="$CM_BUILD_DIR/$XCODE_PROJECT/project.pbxproj"
          BUNDLE_ID="$(awk -F= '$1=="iosBundleId" { print $2 }' "$CM_BUILD_DIR/branding/$BRANDING_KEY/Branding.properties")"
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = com\\.quarkgps;/PRODUCT_BUNDLE_IDENTIFIER = $BUNDLE_ID;/g" "$PBXPROJ_PATH"

      - name: Apply code signing settings
        script: |
          xcode-project use-profiles --archive-method app-store --code-signing-setup-verbose-logging

      - name: Set iOS version numbers
        script: |
          BRANDING_FILE="$CM_BUILD_DIR/branding/$BRANDING_KEY/Branding.properties"
          IOS_MARKETING_VERSION="$(awk -F= '$1=="iosMarketingVersion" { print $2 }' "$BRANDING_FILE")"

          [[ -n "$IOS_MARKETING_VERSION" ]] || { echo "Missing iosMarketingVersion in $BRANDING_FILE"; exit 1; }
          agvtool new-marketing-version "$IOS_MARKETING_VERSION" || true
          agvtool new-version -all "$BUILD_NUMBER" || true

      - name: Build archive
        script: |
          BUNDLE_ID="$(awk -F= '$1=="iosBundleId" { print $2 }' "$CM_BUILD_DIR/branding/$BRANDING_KEY/Branding.properties")"
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$CM_BUILD_DIR/build/RMRastreadores.xcarchive" \
            -allowProvisioningUpdates \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            clean archive

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/RMRastreadores.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build/export" \
            -allowProvisioningUpdates \
            -exportOptionsPlist /Users/builder/export_options.plist

    artifacts:
      - build/export/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  android-rm-release:
    name: Android RM Rastreadores Release (publicar)
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      android_signing:
        - QuarKGPS
      vars:
        ANDROID_PROJECT_DIR: "android"
        ANDROID_MODULE: "app"
        ANDROID_FLAVOR: "Rm"
        ANDROID_FLAVOR_SOURCE_SET: "rm"
        ANDROID_APPLICATION_ID: "com.rmrastreadores"
        BRANDING_KEY: "rmrastreadores"
      java: 17
      groups:
        - quarkgps

    scripts:
      - name: Validate Android project path
        script: |
          [[ -f "$CM_BUILD_DIR/$ANDROID_PROJECT_DIR/gradlew" ]] || {
            echo "Android project not found at $ANDROID_PROJECT_DIR."
            echo "Add your Android project into this repository and set ANDROID_PROJECT_DIR in codemagic.yaml."
            exit 1
          }

      - name: Generate Android launcher icons
        script: |
          SOURCE_ICON="$CM_BUILD_DIR/branding/$BRANDING_KEY/AppIcon-1024.png"
          [[ -f "$SOURCE_ICON" ]] || { echo "Android icon source not found: $SOURCE_ICON"; exit 1; }

          generate_icon_set() {
            local base_dir="$1"

            mkdir -p "$base_dir/drawable-nodpi" "$base_dir/mipmap-mdpi" "$base_dir/mipmap-hdpi" "$base_dir/mipmap-xhdpi" "$base_dir/mipmap-xxhdpi" "$base_dir/mipmap-xxxhdpi"

            # Clean source image only; no text overlays or badges.
            cp "$SOURCE_ICON" "$base_dir/drawable-nodpi/ic_launcher_foreground.png"

            # Legacy launcher icons
            sips -z 48 48 "$SOURCE_ICON" --out "$base_dir/mipmap-mdpi/ic_launcher.png" >/dev/null
            sips -z 72 72 "$SOURCE_ICON" --out "$base_dir/mipmap-hdpi/ic_launcher.png" >/dev/null
            sips -z 96 96 "$SOURCE_ICON" --out "$base_dir/mipmap-xhdpi/ic_launcher.png" >/dev/null
            sips -z 144 144 "$SOURCE_ICON" --out "$base_dir/mipmap-xxhdpi/ic_launcher.png" >/dev/null
            sips -z 192 192 "$SOURCE_ICON" --out "$base_dir/mipmap-xxxhdpi/ic_launcher.png" >/dev/null

            # Round launcher icons
            sips -z 48 48 "$SOURCE_ICON" --out "$base_dir/mipmap-mdpi/ic_launcher_round.png" >/dev/null
            sips -z 72 72 "$SOURCE_ICON" --out "$base_dir/mipmap-hdpi/ic_launcher_round.png" >/dev/null
            sips -z 96 96 "$SOURCE_ICON" --out "$base_dir/mipmap-xhdpi/ic_launcher_round.png" >/dev/null
            sips -z 144 144 "$SOURCE_ICON" --out "$base_dir/mipmap-xxhdpi/ic_launcher_round.png" >/dev/null
            sips -z 192 192 "$SOURCE_ICON" --out "$base_dir/mipmap-xxxhdpi/ic_launcher_round.png" >/dev/null
          }

          generate_icon_set "$CM_BUILD_DIR/$ANDROID_PROJECT_DIR/app/src/main/res"
          generate_icon_set "$CM_BUILD_DIR/$ANDROID_PROJECT_DIR/app/src/$ANDROID_FLAVOR_SOURCE_SET/res"

      - name: Validate Android signing variables
        script: |
          [[ -n "$CM_KEYSTORE_PATH" ]] || { echo "Missing CM_KEYSTORE_PATH from android_signing. Check keystore reference name in codemagic.yaml."; exit 1; }
          [[ -f "$CM_KEYSTORE_PATH" ]] || { echo "Keystore file not found at CM_KEYSTORE_PATH=$CM_KEYSTORE_PATH"; exit 1; }
          [[ -n "$CM_KEYSTORE_PASSWORD" ]] || { echo "Missing CM_KEYSTORE_PASSWORD from android_signing."; exit 1; }
          [[ -n "$CM_KEY_ALIAS" || -n "$CM_KEYSTORE_ALIAS" ]] || { echo "Missing key alias from android_signing (CM_KEY_ALIAS/CM_KEYSTORE_ALIAS)."; exit 1; }
          [[ -n "$CM_KEY_PASSWORD" ]] || { echo "Missing CM_KEY_PASSWORD from android_signing."; exit 1; }

      - name: Build Android App Bundle (release)
        script: |
          cd "$CM_BUILD_DIR/$ANDROID_PROJECT_DIR"
          chmod +x gradlew
          ./gradlew clean :$ANDROID_MODULE:bundle${ANDROID_FLAVOR}Release

    artifacts:
      - "$ANDROID_PROJECT_DIR/$ANDROID_MODULE/build/outputs/**/*.aab"
      - "$ANDROID_PROJECT_DIR/$ANDROID_MODULE/build/outputs/**/*.apk"
      - "$ANDROID_PROJECT_DIR/$ANDROID_MODULE/build/outputs/mapping/**/*.txt"

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal

